<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 280px;
    min-width: 280px;
    background: #1e293b;
    border-right: 1px solid #334155;
    padding: 1.5rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    height: 100vh;
    position: sticky;
    top: 0;
    overflow-y: auto;
  }

  .sidebar h2 {
    font-size: 1.1rem;
    font-weight: 600;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 0.75rem;
    margin-bottom: 0.25rem;
  }

  .sidebar label {
    font-size: 0.85rem;
    color: #cbd5e1;
    display: block;
    margin-bottom: 0.35rem;
    font-weight: 500;
  }

  .sidebar select, .sidebar input {
    width: 100%;
    padding: 0.55rem 0.65rem;
    border-radius: 0.5rem;
    border: 1px solid #334155;
    background: #0f172a;
    color: #e2e8f0;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .sidebar select:focus, .sidebar input:focus {
    border-color: #38bdf8;
  }

  .sidebar select[multiple] {
    height: 220px;
  }

  .sidebar select option {
    padding: 0.3rem 0.4rem;
  }

  .sidebar select option:checked {
    background: #38bdf8 linear-gradient(0deg, #38bdf8 0%, #38bdf8 100%);
    color: #0f172a;
    font-weight: 600;
  }

  .sidebar .hint {
    font-size: 0.75rem;
    color: #64748b;
    margin-top: 0.2rem;
  }

  .sidebar-btn {
    width: 100%;
    padding: 0.6rem;
    border-radius: 0.5rem;
    border: none;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .sidebar-btn:active { transform: scale(0.98); }

  .btn-primary {
    background: linear-gradient(135deg, #38bdf8, #818cf8);
    color: #0f172a;
  }

  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-secondary {
    background: #334155;
    color: #e2e8f0;
  }

  .btn-secondary:hover { background: #475569; }

  .sidebar-divider {
    border: none;
    border-top: 1px solid #334155;
    margin: 0.25rem 0;
  }

  .city-count {
    font-size: 0.8rem;
    color: #38bdf8;
    text-align: center;
    font-weight: 500;
  }

  .sidebar-loading {
    text-align: center;
    color: #64748b;
    font-size: 0.85rem;
    padding: 1rem 0;
  }

  .sidebar-loading .mini-spinner {
    width: 18px;
    height: 18px;
    border: 2px solid #334155;
    border-top-color: #38bdf8;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 0.5rem;
  }

  /* ── Main content ── */
  .main {
    flex: 1;
    padding: 2rem 1.5rem;
    overflow-y: auto;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  header h1 {
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(135deg, #38bdf8, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p {
    color: #94a3b8;
    margin-top: 0.4rem;
    font-size: 0.95rem;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1.5rem;
    max-width: 1400px;
    margin: 0 auto;
  }

  .card {
    background: #1e293b;
    border-radius: 1rem;
    padding: 1.5rem;
    border: 1px solid #334155;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.3);
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.25rem;
  }

  .city-name { font-size: 1.35rem; font-weight: 600; }
  .city-country { font-size: 0.8rem; color: #94a3b8; font-weight: 400; }

  .current {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.25rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid #334155;
  }

  .current-icon { font-size: 3.2rem; line-height: 1; }
  .current-temp { font-size: 2.8rem; font-weight: 700; letter-spacing: -1px; }

  .current-details {
    margin-left: auto;
    text-align: right;
    font-size: 0.85rem;
    color: #94a3b8;
    line-height: 1.7;
  }

  .current-condition { font-size: 0.95rem; color: #cbd5e1; margin-top: 0.15rem; }

  .forecast {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0.35rem;
  }

  .forecast-day {
    text-align: center;
    background: #0f172a;
    border-radius: 0.75rem;
    padding: 0.75rem 0.25rem;
  }

  .forecast-day .day-name {
    font-size: 0.75rem; color: #94a3b8; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.5px;
  }

  .forecast-day .day-icon { font-size: 1.5rem; margin: 0.4rem 0; }
  .forecast-day .day-temps { font-size: 0.8rem; }
  .forecast-day .day-high { font-weight: 600; color: #e2e8f0; }
  .forecast-day .day-low { color: #64748b; margin-left: 2px; }

  .loading { text-align: center; padding: 3rem; color: #64748b; }

  .loading .spinner {
    width: 36px; height: 36px;
    border: 3px solid #334155; border-top-color: #38bdf8;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: #7f1d1d33; color: #fca5a5;
    padding: 0.75rem 1rem; border-radius: 0.5rem;
    font-size: 0.9rem; text-align: center;
  }

  .refresh-btn {
    display: inline-flex; align-items: center; gap: 0.4rem;
    background: #334155; color: #e2e8f0; border: none;
    padding: 0.5rem 1rem; border-radius: 0.5rem;
    cursor: pointer; font-size: 0.85rem; transition: background 0.2s;
  }

  .refresh-btn:hover { background: #475569; }

  .last-updated {
    text-align: center; color: #64748b;
    font-size: 0.8rem; margin-top: 1.5rem;
  }

  /* ── Mobile: sidebar becomes top bar ── */
  @media (max-width: 768px) {
    body { flex-direction: column; }
    .sidebar {
      width: 100%; min-width: 100%;
      height: auto; position: relative;
      flex-direction: column;
      border-right: none;
      border-bottom: 1px solid #334155;
    }
    .sidebar select[multiple] { height: 140px; }
    .main { padding: 1.5rem 1rem; }
    .grid { grid-template-columns: 1fr; }
  }

  @media (max-width: 400px) {
    .current-temp { font-size: 2.2rem; }
    .current-icon { font-size: 2.5rem; }
    .forecast { gap: 0.3rem; }
  }
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <h2>Settings</h2>

  <div>
    <label for="countrySearch">Search Country</label>
    <input type="text" id="countrySearch" placeholder="Type to filter..." autocomplete="off">
  </div>

  <div>
    <label for="countrySelect">Country</label>
    <select id="countrySelect">
      <option value="">Loading countries...</option>
    </select>
  </div>

  <hr class="sidebar-divider">

  <div>
    <label for="citySearch">Search City</label>
    <input type="text" id="citySearch" placeholder="Filter cities..." autocomplete="off" disabled>
  </div>

  <div>
    <label for="citySelect">Cities (select up to 4)</label>
    <div id="cityLoading" class="sidebar-loading" style="display:none;">
      <div class="mini-spinner"></div>
      Finding cities...
    </div>
    <select id="citySelect" multiple disabled>
      <option value="" disabled>Select a country first</option>
    </select>
    <div class="hint">Hold Ctrl/Cmd to select multiple</div>
    <div class="city-count" id="cityCount"></div>
  </div>

  <button class="sidebar-btn btn-primary" id="applyBtn" disabled>Show Weather</button>

  <hr class="sidebar-divider">

  <button class="sidebar-btn btn-secondary" id="resetBtn">Reset to Auto-Detect</button>
</aside>

<!-- Main content -->
<div class="main">
  <header>
    <h1>Weather Dashboard</h1>
    <p id="subtitle">Loading weather data...</p>
  </header>

  <div class="grid" id="cards">
    <div class="loading">
      <div class="spinner"></div>
      Detecting your location...
    </div>
  </div>

  <div class="last-updated" id="footer"></div>
</div>

<script>
const FALLBACK_CITIES = [
  { name: "Riyadh",  country: "SA", lat: 24.7136, lon: 46.6753, tz: "Asia/Riyadh" },
  { name: "Dubai",   country: "AE", lat: 25.2048, lon: 55.2708, tz: "Asia/Dubai" },
  { name: "Cairo",   country: "EG", lat: 30.0444, lon: 31.2357, tz: "Africa/Cairo" },
  { name: "Istanbul", country: "TR", lat: 41.0082, lon: 28.9784, tz: "Europe/Istanbul" }
];

let CITIES = [];
let allCountries = [];
let availableCities = [];
const STORAGE_KEY = "weatherDashboardPrefs";

// ── LocalStorage ──
function savePrefs(countryCode, countryName, selectedCities) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ countryCode, countryName, selectedCities }));
}

function loadPrefs() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function clearPrefs() {
  localStorage.removeItem(STORAGE_KEY);
}

// ── API calls ──
async function detectLocation() {
  const res = await fetch("http://ip-api.com/json/?fields=city,lat,lon,country,countryCode,timezone");
  if (!res.ok) throw new Error("Geolocation failed");
  return res.json();
}

async function fetchCountries() {
  const res = await fetch("https://restcountries.com/v3.1/all?fields=name,cca2");
  if (!res.ok) throw new Error("Failed to fetch countries");
  const data = await res.json();
  return data
    .map(c => ({ code: c.cca2, name: c.name.common }))
    .sort((a, b) => a.name.localeCompare(b.name));
}

// Major cities database — top cities for countries, used as search seeds
const CITY_SEEDS = {

  KW: ["Kuwait City","Hawalli","Salmiya","Jahra","Farwaniya","Mangaf","Fahaheel","Sabah Al Salem"],

  BH: ["Manama","Riffa","Muharraq","Hamad Town","Isa Town","Sitra","Budaiya","Jidhafs"],

async function searchCitiesInCountry(countryCode, countryName) {
  const seeds = CITY_SEEDS[countryCode];
  const seen = new Set();
  const cities = [];

  if (seeds) {
    // Use known city names as search terms — much more reliable
    const batches = [];
    for (let i = 0; i < seeds.length; i += 5) {
      batches.push(seeds.slice(i, i + 5));
    }

    for (const batch of batches) {
      const results = await Promise.all(batch.map(async (name) => {
        try {
          const res = await fetch(
            `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(name)}&count=5&language=en&format=json`
          );
          if (!res.ok) return [];
          const data = await res.json();
          return data.results || [];
        } catch { return []; }
      }));

      for (const list of results) {
        for (const r of list) {
          if (r.country_code === countryCode && !seen.has(r.name)) {
            seen.add(r.name);
            cities.push({
              name: r.name, population: r.population || 0,
              lat: r.latitude, lon: r.longitude, tz: r.timezone
            });
          }
        }
      }
    }
  } else {
    // Fallback: search with country name + common prefixes
    const terms = [countryName.split(" ")[0], "al", "san", "new", "port", "el", "la", "de"];
    for (let i = 0; i < terms.length && cities.length < 15; i += 4) {
      const batch = terms.slice(i, i + 4);
      const results = await Promise.all(batch.map(async (term) => {
        try {
          const res = await fetch(
            `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(term)}&count=100&language=en&format=json`
          );
          if (!res.ok) return [];
          const data = await res.json();
          return data.results || [];
        } catch { return []; }
      }));

      for (const list of results) {
        for (const r of list) {
          if (r.country_code === countryCode && !seen.has(r.name) && r.population) {
            seen.add(r.name);
            cities.push({
              name: r.name, population: r.population,
              lat: r.latitude, lon: r.longitude, tz: r.timezone
            });
          }
        }
      }
    }
  }

  cities.sort((a, b) => b.population - a.population);
  return cities;
}

async function fetchCityWeather(city) {
  const params = new URLSearchParams({
    latitude: city.lat, longitude: city.lon,
    current: "temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m",
    daily: "weather_code,temperature_2m_max,temperature_2m_min",
    timezone: city.tz, forecast_days: 5
  });
  const res = await fetch(`https://api.open-meteo.com/v1/forecast?${params}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// ── WMO codes ──
const WMO_CODES = {
  0:  { desc: "Clear sky",           icon: "\u2600\uFE0F" },
  1:  { desc: "Mainly clear",        icon: "\uD83C\uDF24\uFE0F" },
  2:  { desc: "Partly cloudy",       icon: "\u26C5" },
  3:  { desc: "Overcast",            icon: "\u2601\uFE0F" },
  45: { desc: "Foggy",               icon: "\uD83C\uDF2B\uFE0F" },
  48: { desc: "Depositing rime fog",  icon: "\uD83C\uDF2B\uFE0F" },
  51: { desc: "Light drizzle",       icon: "\uD83C\uDF26\uFE0F" },
  53: { desc: "Moderate drizzle",    icon: "\uD83C\uDF26\uFE0F" },
  55: { desc: "Dense drizzle",       icon: "\uD83C\uDF26\uFE0F" },
  56: { desc: "Freezing drizzle",    icon: "\uD83C\uDF28\uFE0F" },
  57: { desc: "Dense freezing drizzle", icon: "\uD83C\uDF28\uFE0F" },
  61: { desc: "Slight rain",         icon: "\uD83C\uDF27\uFE0F" },
  63: { desc: "Moderate rain",       icon: "\uD83C\uDF27\uFE0F" },
  65: { desc: "Heavy rain",          icon: "\uD83C\uDF27\uFE0F" },
  66: { desc: "Freezing rain",       icon: "\uD83C\uDF28\uFE0F" },
  67: { desc: "Heavy freezing rain",  icon: "\uD83C\uDF28\uFE0F" },
  71: { desc: "Slight snow",         icon: "\uD83C\uDF28\uFE0F" },
  73: { desc: "Moderate snow",       icon: "\u2744\uFE0F" },
  75: { desc: "Heavy snow",          icon: "\u2744\uFE0F" },
  77: { desc: "Snow grains",         icon: "\u2744\uFE0F" },
  80: { desc: "Slight showers",      icon: "\uD83C\uDF26\uFE0F" },
  81: { desc: "Moderate showers",    icon: "\uD83C\uDF27\uFE0F" },
  82: { desc: "Violent showers",     icon: "\uD83C\uDF27\uFE0F" },
  85: { desc: "Slight snow showers", icon: "\uD83C\uDF28\uFE0F" },
  86: { desc: "Heavy snow showers",  icon: "\u2744\uFE0F" },
  95: { desc: "Thunderstorm",        icon: "\u26C8\uFE0F" },
  96: { desc: "Thunderstorm w/ hail", icon: "\u26C8\uFE0F" },
  99: { desc: "Thunderstorm w/ heavy hail", icon: "\u26C8\uFE0F" }
};

function getWeather(code) {
  return WMO_CODES[code] || { desc: "Unknown", icon: "\u2753" };
}

function getDayName(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const diff = (d - today) / 86400000;
  if (diff >= 0 && diff < 1) return "Today";
  if (diff >= 1 && diff < 2) return "Tmrw";
  return d.toLocaleDateString("en-US", { weekday: "short" });
}

// ── Rendering ──
function renderCard(city, data) {
  const cur = data.current;
  const w = getWeather(cur.weather_code);

  let forecastHTML = "";
  for (let i = 0; i < data.daily.time.length; i++) {
    const fw = getWeather(data.daily.weather_code[i]);
    forecastHTML += `
      <div class="forecast-day">
        <div class="day-name">${getDayName(data.daily.time[i])}</div>
        <div class="day-icon">${fw.icon}</div>
        <div class="day-temps">
          <span class="day-high">${Math.round(data.daily.temperature_2m_max[i])}\u00B0</span>
          <span class="day-low">${Math.round(data.daily.temperature_2m_min[i])}\u00B0</span>
        </div>
      </div>`;
  }

  const escapedName = city.name.replace(/'/g, "\\'");
  return `
    <div class="card">
      <div class="card-header">
        <div>
          <div class="city-name">${city.isUser ? "&#x1F4CD; " : ""}${city.name} <span class="city-country">${city.country}</span></div>
          <div class="current-condition">${w.desc}${city.isUser ? " &mdash; Your location" : ""}</div>
        </div>
        <button class="refresh-btn" onclick="refreshCity('${escapedName}')">&#x21bb; Refresh</button>
      </div>
      <div class="current">
        <div class="current-icon">${w.icon}</div>
        <div class="current-temp">${Math.round(cur.temperature_2m)}\u00B0C</div>
        <div class="current-details">
          Humidity: ${cur.relative_humidity_2m}%<br>
          Wind: ${Math.round(cur.wind_speed_10m)} km/h
        </div>
      </div>
      <div class="forecast">${forecastHTML}</div>
    </div>`;
}

function renderError(city, err) {
  const escapedName = city.name.replace(/'/g, "\\'");
  return `
    <div class="card">
      <div class="card-header">
        <div class="city-name">${city.name} <span class="city-country">${city.country}</span></div>
        <button class="refresh-btn" onclick="refreshCity('${escapedName}')">&#x21bb; Retry</button>
      </div>
      <div class="error-msg">Failed to load weather: ${err.message}</div>
    </div>`;
}

const cityResults = new Map();
let currentCountryName = null;

function renderAll() {
  const container = document.getElementById("cards");
  container.innerHTML = "";
  for (const city of CITIES) {
    const entry = cityResults.get(city.name);
    if (!entry) continue;
    container.innerHTML += entry.error
      ? renderError(city, entry.error)
      : renderCard(city, entry.data);
  }
  const now = new Date().toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" });
  document.getElementById("subtitle").textContent = currentCountryName
    ? `Weather across ${currentCountryName}`
    : `Weather for ${CITIES.map(c => c.name).join(", ")}`;
  document.getElementById("footer").textContent = `Last updated: ${now}`;
}

async function loadWeatherForCities() {
  const container = document.getElementById("cards");
  container.innerHTML = '<div class="loading"><div class="spinner"></div>Fetching weather data...</div>';
  cityResults.clear();

  await Promise.allSettled(
    CITIES.map(async (city) => {
      try {
        const data = await fetchCityWeather(city);
        cityResults.set(city.name, { city, data });
      } catch (err) {
        cityResults.set(city.name, { city, error: err });
      }
    })
  );

  renderAll();
}

async function refreshCity(name) {
  const city = CITIES.find(c => c.name === name);
  if (!city) return;
  try {
    const data = await fetchCityWeather(city);
    cityResults.set(name, { city, data });
  } catch (err) {
    cityResults.set(name, { city, error: err });
  }
  renderAll();
}

// ── Sidebar logic ──
const MAX_CITIES = 4;
const countrySelect = document.getElementById("countrySelect");
const countrySearch = document.getElementById("countrySearch");
const citySearch = document.getElementById("citySearch");
const citySelect = document.getElementById("citySelect");
const cityCount = document.getElementById("cityCount");
const cityLoading = document.getElementById("cityLoading");
const applyBtn = document.getElementById("applyBtn");
const resetBtn = document.getElementById("resetBtn");

function populateCountryDropdown(countries, selectedCode) {
  allCountries = countries;
  renderCountryOptions(countries, selectedCode);
}

function renderCountryOptions(filtered, selectedCode) {
  countrySelect.innerHTML = '<option value="">-- Choose a country --</option>';
  for (const c of filtered) {
    const opt = document.createElement("option");
    opt.value = c.code;
    opt.textContent = `${c.name} (${c.code})`;
    if (c.code === selectedCode) opt.selected = true;
    countrySelect.appendChild(opt);
  }
}

countrySearch.addEventListener("input", () => {
  const q = countrySearch.value.toLowerCase();
  const filtered = allCountries.filter(c =>
    c.name.toLowerCase().includes(q) || c.code.toLowerCase().includes(q)
  );
  renderCountryOptions(filtered, countrySelect.value);
});

function renderCityOptions(filter) {
  const q = (filter || "").toLowerCase();
  const selectedNames = new Set(Array.from(citySelect.selectedOptions).map(o => o.value));
  citySelect.innerHTML = "";

  const filtered = q
    ? availableCities.filter(c => c.name.toLowerCase().includes(q))
    : availableCities;

  if (filtered.length === 0) {
    citySelect.innerHTML = '<option value="" disabled>No matching cities</option>';
    return;
  }

  for (const c of filtered) {
    const opt = document.createElement("option");
    opt.value = c.name;
    opt.textContent = `${c.name} (pop: ${(c.population / 1000).toFixed(0)}k)`;
    opt.dataset.lat = c.lat;
    opt.dataset.lon = c.lon;
    opt.dataset.tz = c.tz;
    if (selectedNames.has(c.name)) opt.selected = true;
    citySelect.appendChild(opt);
  }
}

citySearch.addEventListener("input", () => {
  renderCityOptions(citySearch.value);
  updateCityCount();
});

countrySelect.addEventListener("change", async () => {
  const code = countrySelect.value;
  if (!code) {
    citySelect.innerHTML = '<option value="" disabled>Select a country first</option>';
    citySelect.disabled = true;
    citySearch.disabled = true;
    citySearch.value = "";
    applyBtn.disabled = true;
    cityCount.textContent = "";
    return;
  }

  const country = allCountries.find(c => c.code === code);
  citySelect.disabled = true;
  citySelect.innerHTML = "";
  citySearch.disabled = true;
  citySearch.value = "";
  cityLoading.style.display = "block";
  applyBtn.disabled = true;
  cityCount.textContent = "";

  try {
    availableCities = await searchCitiesInCountry(code, country ? country.name : "");
    cityLoading.style.display = "none";
    citySelect.disabled = false;
    citySearch.disabled = false;

    if (availableCities.length === 0) {
      citySelect.innerHTML = '<option value="" disabled>No cities found</option>';
      return;
    }

    renderCityOptions("");

    // Auto-select top 4
    const options = citySelect.options;
    for (let i = 0; i < Math.min(MAX_CITIES, options.length); i++) {
      options[i].selected = true;
    }
    updateCityCount();
    applyBtn.disabled = false;
  } catch (err) {
    cityLoading.style.display = "none";
    citySelect.innerHTML = '<option value="" disabled>Error loading cities</option>';
  }
});

citySelect.addEventListener("change", () => {
  const selected = Array.from(citySelect.selectedOptions);
  if (selected.length > MAX_CITIES) {
    selected[selected.length - 1].selected = false;
  }
  updateCityCount();
  applyBtn.disabled = citySelect.selectedOptions.length === 0;
});

function updateCityCount() {
  const count = citySelect.selectedOptions.length;
  cityCount.textContent = count > 0 ? `${count}/${MAX_CITIES} cities selected` : "";
}

applyBtn.addEventListener("click", () => {
  const code = countrySelect.value;
  const country = allCountries.find(c => c.code === code);
  const selected = Array.from(citySelect.selectedOptions);

  CITIES = selected.map(opt => ({
    name: opt.value,
    country: code,
    lat: parseFloat(opt.dataset.lat),
    lon: parseFloat(opt.dataset.lon),
    tz: opt.dataset.tz
  }));

  currentCountryName = country ? country.name : code;
  savePrefs(code, currentCountryName, CITIES);
  loadWeatherForCities();
});

resetBtn.addEventListener("click", async () => {
  clearPrefs();
  countrySelect.value = "";
  countrySearch.value = "";
  citySearch.value = "";
  citySearch.disabled = true;
  citySelect.innerHTML = '<option value="" disabled>Select a country first</option>';
  citySelect.disabled = true;
  applyBtn.disabled = true;
  cityCount.textContent = "";
  renderCountryOptions(allCountries, "");
  await autoDetectAndLoad();
});

// ── Initialization ──
async function autoDetectAndLoad() {
  const container = document.getElementById("cards");
  container.innerHTML = '<div class="loading"><div class="spinner"></div>Detecting your location...</div>';

  try {
    const loc = await detectLocation();
    const userCity = {
      name: loc.city, country: loc.countryCode,
      lat: loc.lat, lon: loc.lon, tz: loc.timezone, isUser: true
    };

    const countryCities = await searchCitiesInCountry(loc.countryCode, loc.country);
    const others = countryCities
      .filter(c => c.name.toLowerCase() !== loc.city.toLowerCase())
      .slice(0, MAX_CITIES - 1)
      .map(c => ({ name: c.name, country: loc.countryCode, lat: c.lat, lon: c.lon, tz: c.tz }));

    CITIES = [userCity, ...others].slice(0, MAX_CITIES);
    if (CITIES.length < 1) throw new Error("Not enough cities");

    currentCountryName = loc.country;

    // Set sidebar to detected country
    if (countrySelect.querySelector(`option[value="${loc.countryCode}"]`)) {
      countrySelect.value = loc.countryCode;
      countrySelect.dispatchEvent(new Event("change"));
    }
  } catch (err) {
    console.warn("Auto-detect failed, using fallback:", err);
    CITIES = [...FALLBACK_CITIES];
    currentCountryName = null;
  }

  await loadWeatherForCities();
}

async function loadFromSavedPrefs(prefs) {
  CITIES = prefs.selectedCities.slice(0, MAX_CITIES);
  currentCountryName = prefs.countryName;

  // Restore sidebar state
  if (countrySelect.querySelector(`option[value="${prefs.countryCode}"]`)) {
    countrySelect.value = prefs.countryCode;
    countrySelect.dispatchEvent(new Event("change"));

    // Wait for cities to load, then re-select saved ones
    await new Promise(r => setTimeout(r, 100));
    const waitForCities = () => new Promise(resolve => {
      const check = () => {
        if (!citySelect.disabled && citySelect.options.length > 0) return resolve();
        setTimeout(check, 200);
      };
      check();
    });
    await waitForCities();

    const savedNames = new Set(prefs.selectedCities.map(c => c.name));
    for (const opt of citySelect.options) {
      opt.selected = savedNames.has(opt.value);
    }
    updateCityCount();
    applyBtn.disabled = false;
  }

  await loadWeatherForCities();
}

async function init() {
  // Load countries in parallel with checking prefs
  try {
    const countries = await fetchCountries();
    populateCountryDropdown(countries, "");
  } catch {
    countrySelect.innerHTML = '<option value="">Failed to load countries</option>';
  }

  const prefs = loadPrefs();
  if (prefs && prefs.selectedCities && prefs.selectedCities.length > 0) {
    await loadFromSavedPrefs(prefs);
  } else {
    await autoDetectAndLoad();
  }
}

init();
</script>
