<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-deep: #030812;
    --bg-panel: #0a1628;
    --bg-card: #0d1f3c;
    --bg-card-inner: #071222;
    --border-dim: #0e2a4a;
    --border-glow: #00d4ff;
    --cyan: #00d4ff;
    --cyan-dim: #0891b2;
    --purple: #a855f7;
    --purple-dim: #7c3aed;
    --magenta: #e040fb;
    --teal: #2dd4bf;
    --text-primary: #e0f2fe;
    --text-secondary: #7dd3fc;
    --text-muted: #3b82a0;
    --neon-glow: 0 0 15px rgba(0,212,255,0.3), 0 0 30px rgba(0,212,255,0.1);
    --purple-glow: 0 0 15px rgba(168,85,247,0.3), 0 0 30px rgba(168,85,247,0.1);
  }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    overflow-x: hidden;
  }

  /* ── Scanline overlay ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,212,255,0.015) 2px,
      rgba(0,212,255,0.015) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 290px;
    min-width: 290px;
    background: var(--bg-panel);
    border-right: 1px solid var(--border-dim);
    padding: 0 1rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.85rem;
    height: 100vh;
    position: sticky;
    top: 0;
    overflow-y: auto;
    z-index: 10;
    box-shadow: 4px 0 30px rgba(0,0,0,0.5);
  }

  .sidebar::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 1px; height: 100%;
    background: linear-gradient(180deg, var(--cyan) 0%, transparent 30%, transparent 70%, var(--purple) 100%);
    opacity: 0.6;
  }

  /* ── Logo area ── */
  .logo-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 0 0.75rem;
    position: relative;
  }

  @property --logo-angle {
    syntax: '<angle>';
    initial-value: 0deg;
    inherits: false;
  }

  @property --logo-angle2 {
    syntax: '<angle>';
    initial-value: 180deg;
    inherits: false;
  }

  .logo-ring {
    width: 90px; height: 90px;
    border-radius: 50%;
    padding: 3px;
    background: conic-gradient(from var(--logo-angle), var(--cyan), var(--purple), var(--magenta), var(--cyan));
    animation: logoSpin 4s linear infinite;
    position: relative;
  }

  .logo-ring::before {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    background: conic-gradient(from var(--logo-angle2), var(--cyan), transparent 40%, var(--purple), transparent 80%, var(--cyan));
    opacity: 0.5;
    animation: logoSpin2 6s linear infinite;
    filter: blur(6px);
    z-index: -1;
  }

  @keyframes logoSpin {
    to { --logo-angle: 360deg; }
  }

  @keyframes logoSpin2 {
    to { --logo-angle2: -180deg; }
  }

  .logo-img {
    width: 100%; height: 100%;
    border-radius: 50%;
    object-fit: cover;
    display: block;
    background: var(--bg-deep);
  }

  .logo-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--cyan);
    margin-top: 0.75rem;
    text-shadow: 0 0 10px rgba(0,212,255,0.5);
  }

  .logo-subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    color: var(--text-muted);
    letter-spacing: 2px;
    margin-top: 0.15rem;
  }

  .sidebar h2 {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    font-weight: 600;
    color: var(--cyan-dim);
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 0.25rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .sidebar h2::before {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border-dim), transparent);
  }

  .sidebar h2::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border-dim));
  }

  .sidebar label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-secondary);
    display: block;
    margin-bottom: 0.3rem;
    font-weight: 400;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .sidebar select, .sidebar input {
    width: 100%;
    padding: 0.55rem 0.65rem;
    border-radius: 4px;
    border: 1px solid var(--border-dim);
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .sidebar select:focus, .sidebar input:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 12px rgba(0,212,255,0.15), inset 0 0 12px rgba(0,212,255,0.05);
  }

  .sidebar select[multiple],
  .sidebar select[size] {
    height: 200px;
    scrollbar-width: thin;
    scrollbar-color: var(--cyan-dim) var(--bg-deep);
  }

  .sidebar select option {
    padding: 0.3rem 0.4rem;
    font-family: 'Rajdhani', sans-serif;
  }

  .sidebar select option:checked {
    background: linear-gradient(90deg, rgba(0,212,255,0.2), rgba(168,85,247,0.15));
    color: var(--cyan);
    font-weight: 600;
  }

  .sidebar .hint {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-muted);
    margin-top: 0.2rem;
    letter-spacing: 0.5px;
  }

  .sidebar-btn {
    width: 100%;
    padding: 0.75rem 1rem;
    border-radius: 4px;
    border: 1px solid transparent;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .sidebar-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
    transform: translateX(-100%);
    transition: transform 0.6s;
  }

  .sidebar-btn:hover::before {
    transform: translateX(100%);
  }

  .sidebar-btn:active { transform: scale(0.98); }

  .btn-primary {
    background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(168,85,247,0.15));
    color: var(--cyan);
    border-color: var(--cyan-dim);
    box-shadow: 0 0 20px rgba(0,212,255,0.1);
  }

  .btn-primary:hover {
    border-color: var(--cyan);
    box-shadow: 0 0 25px rgba(0,212,255,0.2);
    background: linear-gradient(135deg, rgba(0,212,255,0.25), rgba(168,85,247,0.2));
  }

  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }

  .btn-secondary {
    background: rgba(255,255,255,0.03);
    color: var(--text-muted);
    border-color: var(--border-dim);
  }

  .btn-secondary:hover {
    background: rgba(255,255,255,0.06);
    color: var(--text-secondary);
    border-color: var(--purple-dim);
  }

  .sidebar-divider {
    border: none;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border-dim), transparent);
    margin: 0.15rem 0;
  }

  .city-count {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--cyan);
    text-align: center;
    font-weight: 400;
    letter-spacing: 1px;
  }

  .sidebar-loading {
    text-align: center;
    color: var(--text-muted);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    padding: 1rem 0;
    letter-spacing: 1px;
  }

  .sidebar-loading .mini-spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border-dim);
    border-top-color: var(--cyan);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 0.5rem;
  }

  /* ── Main content ── */
  .main {
    flex: 1;
    padding: 2rem 2rem;
    overflow-y: auto;
    position: relative;
    background:
      radial-gradient(ellipse 80% 60% at 50% 40%, rgba(0,212,255,0.03) 0%, transparent 70%),
      radial-gradient(ellipse 60% 50% at 80% 20%, rgba(168,85,247,0.03) 0%, transparent 60%);
  }

  /* ── Grid background ── */
  .main::before {
    content: '';
    position: fixed;
    top: 0; left: 290px; right: 0; bottom: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
    mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 20%, transparent 70%);
    -webkit-mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 20%, transparent 70%);
  }

  /* ── World Map SVG Background ── */
  .world-map-bg {
    position: fixed;
    top: 50%; left: calc(290px + 50%);
    transform: translate(-50%, -50%);
    width: 85%;
    max-width: 1100px;
    opacity: 0.07;
    z-index: 0;
    pointer-events: none;
    filter: drop-shadow(0 0 20px rgba(0,212,255,0.2));
  }

  .world-map-bg path {
    fill: none;
    stroke: var(--cyan);
    stroke-width: 0.5;
  }

  /* Glowing city dots on map */
  .map-dot {
    fill: var(--cyan);
    opacity: 0;
    animation: dotPulse 4s ease-in-out infinite;
  }
  .map-dot:nth-child(2) { animation-delay: 0.8s; }
  .map-dot:nth-child(3) { animation-delay: 1.6s; }
  .map-dot:nth-child(4) { animation-delay: 2.4s; }
  .map-dot:nth-child(5) { animation-delay: 3.2s; }
  .map-dot:nth-child(6) { animation-delay: 0.4s; }
  .map-dot:nth-child(7) { animation-delay: 1.2s; }
  .map-dot:nth-child(8) { animation-delay: 2.0s; }
  .map-dot:nth-child(9) { animation-delay: 2.8s; }

  @keyframes dotPulse {
    0%, 100% { opacity: 0.2; r: 2; }
    50% { opacity: 1; r: 4; }
  }

  .map-ring {
    fill: none;
    stroke: var(--cyan);
    stroke-width: 0.3;
    opacity: 0;
    animation: ringExpand 4s ease-out infinite;
  }
  .map-ring:nth-child(2) { animation-delay: 0.8s; }
  .map-ring:nth-child(3) { animation-delay: 1.6s; }
  .map-ring:nth-child(4) { animation-delay: 2.4s; }

  @keyframes ringExpand {
    0% { r: 2; opacity: 0.6; }
    100% { r: 14; opacity: 0; }
  }

  /* ── Floating particles ── */
  .particles {
    position: fixed;
    top: 0; left: 290px; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    width: 2px; height: 2px;
    background: var(--cyan);
    border-radius: 50%;
    opacity: 0;
    animation: particleFloat linear infinite;
  }

  @keyframes particleFloat {
    0% { transform: translateY(100vh) translateX(0); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.6; }
    100% { transform: translateY(-20px) translateX(30px); opacity: 0; }
  }

  /* ── Header ── */
  header {
    text-align: center;
    margin-bottom: 2.5rem;
    position: relative;
    z-index: 1;
  }

  header h1 {
    font-family: 'Orbitron', monospace;
    font-size: 1.8rem;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    background: linear-gradient(135deg, var(--cyan) 0%, var(--purple) 50%, var(--magenta) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    position: relative;
    animation: titleGlow 3s ease-in-out infinite alternate;
  }

  @keyframes titleGlow {
    0% { filter: drop-shadow(0 0 8px rgba(0,212,255,0.3)); }
    100% { filter: drop-shadow(0 0 16px rgba(168,85,247,0.4)); }
  }

  header p {
    font-family: 'Share Tech Mono', monospace;
    color: var(--text-muted);
    margin-top: 0.5rem;
    font-size: 0.85rem;
    letter-spacing: 2px;
  }

  /* ── Status bar under header ── */
  .status-bar {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-top: 1rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 1px;
  }

  .status-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--teal);
    box-shadow: 0 0 8px var(--teal);
    animation: statusBlink 2s ease-in-out infinite;
  }

  @keyframes statusBlink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1.5rem;
    max-width: 1400px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* ── Cards ── */
  .card {
    background: linear-gradient(135deg, var(--bg-card) 0%, rgba(13,31,60,0.8) 100%);
    border-radius: 8px;
    padding: 1.5rem;
    border: 1px solid var(--border-dim);
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(10px);
  }

  /* Corner accents */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 30px; height: 30px;
    border-top: 2px solid var(--cyan);
    border-left: 2px solid var(--cyan);
    border-radius: 8px 0 0 0;
    opacity: 0.5;
    transition: opacity 0.4s, width 0.4s, height 0.4s;
  }

  .card::after {
    content: '';
    position: absolute;
    bottom: 0; right: 0;
    width: 30px; height: 30px;
    border-bottom: 2px solid var(--purple);
    border-right: 2px solid var(--purple);
    border-radius: 0 0 8px 0;
    opacity: 0.5;
    transition: opacity 0.4s, width 0.4s, height 0.4s;
  }

  .card:hover {
    transform: translateY(-4px);
    border-color: rgba(0,212,255,0.3);
    box-shadow:
      0 8px 32px rgba(0,0,0,0.4),
      0 0 30px rgba(0,212,255,0.08),
      inset 0 1px 0 rgba(0,212,255,0.1);
  }

  .card:hover::before {
    width: 50px; height: 50px;
    opacity: 0.8;
  }

  .card:hover::after {
    width: 50px; height: 50px;
    opacity: 0.8;
  }

  /* Animated gradient line at top of card */
  .card-glow-line {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), var(--purple), transparent);
    background-size: 200% 100%;
    animation: glowSlide 3s linear infinite;
  }

  @keyframes glowSlide {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.25rem;
  }

  .city-name {
    font-family: 'Orbitron', monospace;
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--text-primary);
  }

  .city-country {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--cyan-dim);
    font-weight: 400;
    letter-spacing: 1px;
    margin-left: 0.4rem;
  }

  .current {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.25rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--border-dim);
    position: relative;
  }

  .current::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border-glow), transparent);
    opacity: 0.15;
  }

  .current-icon { font-size: 3.2rem; line-height: 1; filter: drop-shadow(0 0 8px rgba(0,212,255,0.3)); }
  .current-temp {
    font-family: 'Orbitron', monospace;
    font-size: 2.6rem;
    font-weight: 700;
    letter-spacing: -1px;
    color: var(--text-primary);
    text-shadow: 0 0 20px rgba(0,212,255,0.2);
  }

  .current-details {
    margin-left: auto;
    text-align: right;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
    line-height: 1.9;
    letter-spacing: 0.5px;
  }

  .current-condition {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.9rem;
    color: var(--text-secondary);
    margin-top: 0.15rem;
    font-weight: 500;
  }

  .forecast {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0.35rem;
  }

  .forecast-day {
    text-align: center;
    background: var(--bg-card-inner);
    border-radius: 6px;
    padding: 0.75rem 0.25rem;
    border: 1px solid rgba(14,42,74,0.5);
    transition: border-color 0.3s, background 0.3s;
  }

  .forecast-day:hover {
    border-color: var(--cyan-dim);
    background: rgba(0,212,255,0.04);
  }

  .forecast-day .day-name {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-muted);
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .forecast-day .day-icon { font-size: 1.5rem; margin: 0.4rem 0; }
  .forecast-day .day-temps { font-size: 0.8rem; font-family: 'Rajdhani', sans-serif; font-weight: 600; }
  .forecast-day .day-high { color: var(--text-primary); }
  .forecast-day .day-low { color: var(--text-muted); margin-left: 2px; }

  .loading {
    text-align: center;
    padding: 3rem;
    color: var(--text-muted);
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 2px;
    font-size: 0.85rem;
  }

  .loading .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border-dim);
    border-top-color: var(--cyan);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
    box-shadow: 0 0 15px rgba(0,212,255,0.2);
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: rgba(127,29,29,0.2);
    color: #fca5a5;
    padding: 0.75rem 1rem;
    border-radius: 4px;
    font-size: 0.9rem;
    text-align: center;
    border: 1px solid rgba(239,68,68,0.2);
  }

  .refresh-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: rgba(255,255,255,0.03);
    color: var(--text-muted);
    border: 1px solid var(--border-dim);
    padding: 0.4rem 0.8rem;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 1px;
    transition: all 0.3s;
  }

  .refresh-btn:hover {
    background: rgba(0,212,255,0.08);
    border-color: var(--cyan-dim);
    color: var(--cyan);
  }

  .last-updated {
    text-align: center;
    color: var(--text-muted);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 2px;
    margin-top: 2rem;
    position: relative;
    z-index: 1;
  }

  /* ── Card entrance animation ── */
  .card {
    animation: cardEnter 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  .card:nth-child(1) { animation-delay: 0.1s; }
  .card:nth-child(2) { animation-delay: 0.2s; }
  .card:nth-child(3) { animation-delay: 0.3s; }
  .card:nth-child(4) { animation-delay: 0.4s; }

  @keyframes cardEnter {
    from {
      opacity: 0;
      transform: translateY(30px) scale(0.97);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-deep); }
  ::-webkit-scrollbar-thumb {
    background: var(--border-dim);
    border-radius: 3px;
  }
  ::-webkit-scrollbar-thumb:hover { background: var(--cyan-dim); }

  /* ── Mobile ── */
  @media (max-width: 768px) {
    body { flex-direction: column; }
    .sidebar {
      width: 100%; min-width: 100%;
      height: auto; position: relative;
      border-right: none;
      border-bottom: 1px solid var(--border-dim);
    }
    .sidebar::before { display: none; }
    .sidebar select[multiple],
    .sidebar select[size] { height: 140px; }
    .main { padding: 1.5rem 1rem; }
    .main::before { left: 0; }
    .grid { grid-template-columns: 1fr; }
    .world-map-bg { left: 50%; width: 95%; }
    .particles { left: 0; }
    .logo-area { padding: 1rem 0 0.5rem; }
    .logo-ring { width: 60px; height: 60px; }
  }

  @media (max-width: 400px) {
    .current-temp { font-size: 2.2rem; }
    .current-icon { font-size: 2.5rem; }
    .forecast { gap: 0.3rem; }
  }

  /* ── Chatbot ── */
  .chat-fab {
    position: fixed;
    bottom: 24px; right: 24px;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    border: none;
    cursor: pointer;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    box-shadow: 0 4px 20px rgba(0,212,255,0.3);
    transition: transform 0.3s, box-shadow 0.3s;
  }

  .chat-fab:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 30px rgba(0,212,255,0.5);
  }

  .chat-fab .badge {
    position: absolute;
    top: -2px; right: -2px;
    width: 14px; height: 14px;
    background: var(--magenta);
    border-radius: 50%;
    border: 2px solid var(--bg-deep);
    animation: statusBlink 1.5s ease-in-out infinite;
  }

  .chat-panel {
    position: fixed;
    bottom: 90px; right: 24px;
    width: 380px;
    max-height: 520px;
    background: var(--bg-panel);
    border: 1px solid var(--border-dim);
    border-radius: 12px;
    z-index: 1000;
    display: none;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 30px rgba(0,212,255,0.08);
  }

  .chat-panel.open { display: flex; }

  .chat-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--cyan), var(--purple), var(--magenta));
  }

  .chat-header {
    padding: 0.85rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    border-bottom: 1px solid var(--border-dim);
    background: rgba(0,0,0,0.2);
  }

  .chat-header-icon {
    font-size: 1.3rem;
  }

  .chat-header-text {
    flex: 1;
  }

  .chat-header-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--cyan);
  }

  .chat-header-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    color: var(--text-muted);
    letter-spacing: 1px;
  }

  .chat-close {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 1.2rem;
    padding: 0.2rem;
    transition: color 0.2s;
  }

  .chat-close:hover { color: var(--text-primary); }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    min-height: 200px;
    max-height: 340px;
    scrollbar-width: thin;
    scrollbar-color: var(--cyan-dim) var(--bg-deep);
  }

  .chat-msg {
    max-width: 90%;
    padding: 0.7rem 0.9rem;
    border-radius: 8px;
    font-size: 0.85rem;
    line-height: 1.55;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 500;
    animation: chatMsgIn 0.3s ease-out;
  }

  @keyframes chatMsgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .chat-msg.bot {
    align-self: flex-start;
    background: var(--bg-card);
    border: 1px solid var(--border-dim);
    color: var(--text-primary);
    border-top-left-radius: 2px;
  }

  .chat-msg.user {
    align-self: flex-end;
    background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(168,85,247,0.15));
    border: 1px solid var(--cyan-dim);
    color: var(--cyan);
    border-top-right-radius: 2px;
  }

  .chat-msg.bot .msg-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    color: var(--cyan-dim);
    letter-spacing: 1px;
    margin-bottom: 0.3rem;
    text-transform: uppercase;
  }

  .chat-msg.typing .dot-pulse {
    display: inline-flex;
    gap: 4px;
  }

  .chat-msg.typing .dot-pulse span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--cyan);
    animation: dotBounce 1.2s ease-in-out infinite;
  }

  .chat-msg.typing .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
  .chat-msg.typing .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dotBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  .chat-input-area {
    display: flex;
    gap: 0.5rem;
    padding: 0.75rem;
    border-top: 1px solid var(--border-dim);
    background: rgba(0,0,0,0.2);
  }

  .chat-input {
    flex: 1;
    padding: 0.55rem 0.75rem;
    border-radius: 6px;
    border: 1px solid var(--border-dim);
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    outline: none;
    transition: border-color 0.3s;
  }

  .chat-input:focus { border-color: var(--cyan); }

  .chat-input::placeholder {
    color: var(--text-muted);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
  }

  .chat-send {
    padding: 0.55rem 0.9rem;
    border-radius: 6px;
    border: 1px solid var(--cyan-dim);
    background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(168,85,247,0.1));
    color: var(--cyan);
    font-family: 'Orbitron', monospace;
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.3s;
  }

  .chat-send:hover {
    background: linear-gradient(135deg, rgba(0,212,255,0.25), rgba(168,85,247,0.2));
    border-color: var(--cyan);
  }

  .chat-send:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  @media (max-width: 768px) {
    .chat-panel {
      right: 8px; left: 8px;
      bottom: 80px;
      width: auto;
    }
    .chat-fab { bottom: 16px; right: 16px; }
  }
</style>
</head>

async function searchCitiesInCountry(countryCode, countryName) {
  const seeds = CITY_SEEDS[countryCode];
  const seen = new Set();
  const cities = [];

  if (seeds) {
    const batches = [];
    for (let i = 0; i < seeds.length; i += 5) {
      batches.push(seeds.slice(i, i + 5));
    }

    for (const batch of batches) {
      const results = await Promise.all(batch.map(async (name) => {
        try {
          const res = await fetch(
            `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(name)}&count=5&language=en&format=json`
          );
          if (!res.ok) return [];
          const data = await res.json();
          return data.results || [];
        } catch { return []; }
      }));

      for (const list of results) {
        for (const r of list) {
          if (r.country_code === countryCode && !seen.has(r.name)) {
            seen.add(r.name);
            cities.push({
              name: r.name, population: r.population || 0,
              lat: r.latitude, lon: r.longitude, tz: r.timezone
            });
          }
        }
      }
    }
  } else {
    const terms = [countryName.split(" ")[0], "al", "san", "new", "port", "el", "la", "de"];
    for (let i = 0; i < terms.length && cities.length < 15; i += 4) {
      const batch = terms.slice(i, i + 4);
      const results = await Promise.all(batch.map(async (term) => {
        try {
          const res = await fetch(
            `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(term)}&count=100&language=en&format=json`
          );
          if (!res.ok) return [];
          const data = await res.json();
          return data.results || [];
        } catch { return []; }
      }));

      for (const list of results) {
        for (const r of list) {
          if (r.country_code === countryCode && !seen.has(r.name) && r.population) {
            seen.add(r.name);
            cities.push({
              name: r.name, population: r.population,
              lat: r.latitude, lon: r.longitude, tz: r.timezone
            });
          }
        }
      }
    }
  }

  cities.sort((a, b) => b.population - a.population);
  return cities;
}

async function fetchCityWeather(city) {
  const params = new URLSearchParams({
    latitude: city.lat, longitude: city.lon,
    current: "temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m",
    daily: "weather_code,temperature_2m_max,temperature_2m_min",
    timezone: city.tz, forecast_days: 5
  });
  const res = await fetch(`https://api.open-meteo.com/v1/forecast?${params}`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

function getWeather(code) {
  return WMO_CODES[code] || { desc: "Unknown", icon: "\u2753" };
}

function getDayName(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const diff = (d - today) / 86400000;
  if (diff >= 0 && diff < 1) return "Today";
  if (diff >= 1 && diff < 2) return "Tmrw";
  return d.toLocaleDateString("en-US", { weekday: "short" });
}

// ── Rendering ──
function renderCard(city, data) {
  const cur = data.current;
  const w = getWeather(cur.weather_code);

  let forecastHTML = "";

    const fw = getWeather(data.daily.weather_code[i]);
    forecastHTML += `
      <div class="forecast-day">
        <div class="day-name">${getDayName(data.daily.time[i])}</div>
        <div class="day-icon">${fw.icon}</div>
        <div class="day-temps">
          <span class="day-high">${Math.round(data.daily.temperature_2m_max[i])}\u00B0</span>

    <div class="card">

          <div class="city-name">${city.isUser ? "&#x1F4CD; " : ""}${city.name} <span class="city-country">${city.country}</span></div>

      </div>
      <div class="forecast">${forecastHTML}</div>
    </div>`;
}

const cityResults = new Map();
let currentCountryName = null;
let currentCountryLanguage = 'English';

function renderAll() {
  const container = document.getElementById("cards");
  container.innerHTML = "";
  for (const city of CITIES) {
    const entry = cityResults.get(city.name);
    if (!entry) continue;
    container.innerHTML += entry.error
      ? renderError(city, entry.error)
      : renderCard(city, entry.data);
  }
  const now = new Date().toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" });
  document.getElementById("subtitle").textContent = currentCountryName
    ? `// MONITORING: ${currentCountryName.toUpperCase()}`
    : `// TARGETS: ${CITIES.map(c => c.name).join(" / ")}`;
  document.getElementById("footer").textContent = `[ LAST SYNC: ${now} ]`;
}

async function loadWeatherForCities() {
  const container = document.getElementById("cards");
  container.innerHTML = '<div class="loading"><div class="spinner"></div>Establishing satellite uplink...</div>';
  cityResults.clear();

  await Promise.allSettled(
    CITIES.map(async (city) => {
      try {
        const data = await fetchCityWeather(city);
        cityResults.set(city.name, { city, data });
      } catch (err) {
        cityResults.set(city.name, { city, error: err });
      }
    })
  );

  renderAll();
}

async function refreshCity(name) {
  const city = CITIES.find(c => c.name === name);
  if (!city) return;
  try {
    const data = await fetchCityWeather(city);
    cityResults.set(name, { city, data });
  } catch (err) {
    cityResults.set(name, { city, error: err });
  }
  renderAll();
}

function renderCityOptions(filter) {
  const q = (filter || "").toLowerCase();
  const selectedNames = new Set(Array.from(citySelect.selectedOptions).map(o => o.value));
  citySelect.innerHTML = "";

  const filtered = q
    ? availableCities.filter(c => c.name.toLowerCase().includes(q))
    : availableCities;

  if (filtered.length === 0) {
    citySelect.innerHTML = '<option value="" disabled>No matching signals</option>';
    return;
  }

  for (const c of filtered) {
    const opt = document.createElement("option");
    opt.value = c.name;
    opt.textContent = `${c.name} (pop: ${(c.population / 1000).toFixed(0)}k)`;
    opt.dataset.lat = c.lat;
    opt.dataset.lon = c.lon;
    opt.dataset.tz = c.tz;
    if (selectedNames.has(c.name)) opt.selected = true;
    citySelect.appendChild(opt);
  }
}

  citySearch.value = "";
  cityLoading.style.display = "block";
  applyBtn.disabled = true;
  cityCount.textContent = "";

  try {
    availableCities = await searchCitiesInCountry(code, country ? country.name : "");
    cityLoading.style.display = "none";
    citySelect.disabled = false;
    citySearch.disabled = false;

    if (availableCities.length === 0) {
      citySelect.innerHTML = '<option value="" disabled>No cities found</option>';
      return;
    }

    renderCityOptions("");

    const options = citySelect.options;
    for (let i = 0; i < Math.min(MAX_CITIES, options.length); i++) {
      options[i].selected = true;
    }
    updateCityCount();
    applyBtn.disabled = false;
  } catch (err) {
    cityLoading.style.display = "none";
    citySelect.innerHTML = '<option value="" disabled>Error loading cities</option>';
  }
});

citySelect.addEventListener("change", () => {
  const selected = Array.from(citySelect.selectedOptions);
  if (selected.length > MAX_CITIES) {
    selected[selected.length - 1].selected = false;
  }
  updateCityCount();
  applyBtn.disabled = citySelect.selectedOptions.length === 0;
});

function updateCityCount() {
  const count = citySelect.selectedOptions.length;
  cityCount.textContent = count > 0 ? `[ ${count}/${MAX_CITIES} TARGETS LOCKED ]` : "";
}

applyBtn.addEventListener("click", () => {
  const code = countrySelect.value;
  const country = allCountries.find(c => c.code === code);
  const selected = Array.from(citySelect.selectedOptions);

  CITIES = selected.map(opt => ({
    name: opt.value,
    country: code,
    lat: parseFloat(opt.dataset.lat),
    lon: parseFloat(opt.dataset.lon),
    tz: opt.dataset.tz
  }));

  currentCountryName = country ? country.name : code;
  currentCountryLanguage = country ? country.language : 'English';
  savePrefs(code, currentCountryName, CITIES);
  resetChat();
  loadWeatherForCities();
});

resetBtn.addEventListener("click", async () => {
  clearPrefs();
  resetChat();
  countrySelect.value = "";
  countrySearch.value = "";
  citySearch.value = "";
  citySearch.disabled = true;
  citySelect.innerHTML = '<option value="" disabled>Select a country first</option>';
  citySelect.disabled = true;
  applyBtn.disabled = true;
  cityCount.textContent = "";
  renderCountryOptions(allCountries, "");
  await autoDetectAndLoad();
});

// ── Initialization ──
async function autoDetectAndLoad() {
  const container = document.getElementById("cards");
  container.innerHTML = '<div class="loading"><div class="spinner"></div>Triangulating position...</div>';

  try {
    const loc = await detectLocation();
    const userCity = {
      name: loc.city, country: loc.countryCode,
      lat: loc.lat, lon: loc.lon, tz: loc.timezone, isUser: true
    };

    const countryCities = await searchCitiesInCountry(loc.countryCode, loc.country);
    const others = countryCities
      .filter(c => c.name.toLowerCase() !== loc.city.toLowerCase())
      .slice(0, MAX_CITIES - 1)
      .map(c => ({ name: c.name, country: loc.countryCode, lat: c.lat, lon: c.lon, tz: c.tz }));

    CITIES = [userCity, ...others].slice(0, MAX_CITIES);
    if (CITIES.length < 1) throw new Error("Not enough cities");

    currentCountryName = loc.country;
    const detectedCountry = allCountries.find(c => c.code === loc.countryCode);
    currentCountryLanguage = detectedCountry ? detectedCountry.language : 'English';

    if (countrySelect.querySelector(`option[value="${loc.countryCode}"]`)) {
      countrySelect.value = loc.countryCode;
      countrySelect.dispatchEvent(new Event("change"));
    }
  } catch (err) {
    console.warn("Auto-detect failed, using fallback:", err);
    CITIES = [...FALLBACK_CITIES];
    currentCountryName = null;
    currentCountryLanguage = 'English';
  }

  await loadWeatherForCities();
}

async function loadFromSavedPrefs(prefs) {
  CITIES = prefs.selectedCities.slice(0, MAX_CITIES);
  currentCountryName = prefs.countryName;
  const savedCountry = allCountries.find(c => c.name === prefs.countryName);
  currentCountryLanguage = savedCountry ? savedCountry.language : 'English';

  if (countrySelect.querySelector(`option[value="${prefs.countryCode}"]`)) {
    countrySelect.value = prefs.countryCode;
    countrySelect.dispatchEvent(new Event("change"));

    await new Promise(r => setTimeout(r, 100));
    const waitForCities = () => new Promise(resolve => {
      const check = () => {
        if (!citySelect.disabled && citySelect.options.length > 0) return resolve();
        setTimeout(check, 200);
      };
      check();
    });
    await waitForCities();

    const savedNames = new Set(prefs.selectedCities.map(c => c.name));
    for (const opt of citySelect.options) {
      opt.selected = savedNames.has(opt.value);
    }
    updateCityCount();
    applyBtn.disabled = false;
  }

  await loadWeatherForCities();
}

async function init() {
  try {
    const countries = await fetchCountries();
    populateCountryDropdown(countries, "");
  } catch {
    countrySelect.innerHTML = '<option value="" disabled>Failed to load countries</option>';
  }

  // Always auto-detect location on load (ignore saved prefs)
  clearPrefs();
  await autoDetectAndLoad();
}

// ── Outfit Advisor Chatbot ──
const chatFab = document.getElementById('chatFab');
const chatPanel = document.getElementById('chatPanel');
const chatClose = document.getElementById('chatClose');
const chatMessages = document.getElementById('chatMessages');
const chatInput = document.getElementById('chatInput');
const chatSend = document.getElementById('chatSend');
const chatBadge = document.getElementById('chatBadge');
const chatStatus = document.getElementById('chatStatus');

let chatHistory = [];
let chatBusy = false;
let autoAdviceShown = false;
let chatPreloaded = false;

function resetChat() {
  chatHistory = [];
  chatBusy = false;
  autoAdviceShown = false;
  chatPreloaded = false;
  chatMessages.innerHTML = '';
  chatBadge.style.display = 'none';
  chatStatus.textContent = '// AI-POWERED STYLE INTEL';
}

chatFab.addEventListener('click', () => {
  chatPanel.classList.toggle('open');
  chatBadge.style.display = 'none';
  if (chatPreloaded) {
    chatPreloaded = false;
    for (const msg of chatHistory) {
      if (msg.role === 'user') continue;
      addChatMsg('bot', msg.content);
    }
  }
});

chatClose.addEventListener('click', () => {
  chatPanel.classList.toggle('open');
});

chatInput.addEventListener('input', () => {
  chatSend.disabled = !chatInput.value.trim() || chatBusy;
});

chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !chatSend.disabled) sendUserMessage();
});

chatSend.addEventListener('click', sendUserMessage);

function addChatMsg(role, text) {
  const div = document.createElement('div');
  div.className = `chat-msg ${role}`;
  if (role === 'bot') {
    div.innerHTML = `<div class="msg-label">AI Advisor</div>${formatChatText(text)}`;
  } else {
    div.textContent = text;
  }
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return div;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'chat-msg bot typing';
  div.id = 'chatTyping';
  div.innerHTML = `<div class="msg-label">AI Advisor</div><div class="dot-pulse"><span></span><span></span><span></span></div>`;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('chatTyping');
  if (el) el.remove();
}

function formatChatText(text) {
  const escaped = text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  return escaped
    .replace(/^#{1,4}\s+(.*)$/gm, '<strong>$1</strong>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

function getWeatherContext() {
  const userCity = CITIES.find(c => c.isUser) || CITIES[0];
  if (!userCity) return null;
  const entry = cityResults.get(userCity.name);
  if (!entry || entry.error) return null;
  const cur = entry.data.current;
  const daily = entry.data.daily;
  const w = getWeather(cur.weather_code);
  return {
    city: userCity.name,
    country: userCity.country,
    countryName: currentCountryName || userCity.country,
    language: currentCountryLanguage || 'English',
    temp: Math.round(cur.temperature_2m),
    humidity: cur.relative_humidity_2m,
    wind: Math.round(cur.wind_speed_10m),
    condition: w.desc,
    forecast: daily ? daily.time.map((t, i) => ({
      date: t,
      high: Math.round(daily.temperature_2m_max[i]),
      low: Math.round(daily.temperature_2m_min[i]),
      condition: getWeather(daily.weather_code[i]).desc
    })) : []
  };
}

function buildSystemPrompt(ctx) {
  return `You are a friendly outfit advisor AI. You give practical clothing advice based on weather and local culture.

CURRENT WEATHER DATA:
- City: ${ctx.city}, ${ctx.countryName}
- Temperature: ${ctx.temp}°C
- Condition: ${ctx.condition}
- Humidity: ${ctx.humidity}%
- Wind: ${ctx.wind} km/h

RULES:
- Respond entirely in ${ctx.language}, including all headings, labels, and section titles. If you cannot respond in ${ctx.language}, fall back to English
- Structure advice as recommended and not recommended outfit choices, using translated headings in ${ctx.language}
- Consider the weather (temperature, rain, wind, humidity)
- Consider cultural norms for ${ctx.countryName} (modest dress codes, local customs)
- Be concise — max 150 words
- Use a warm, friendly tone
- If asked follow-up questions, keep the weather context in mind`;
}

async function callLLM(messages) {
  const res = await fetch('http://localhost:3000/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      messages: messages,
      temperature: 0.7,
      max_tokens: 300
    })
  });

  if (!res.ok) {
    let errMsg = `API error: ${res.status}`;
    try {
      const errBody = await res.json();
      if (errBody.error && errBody.error.message) errMsg = errBody.error.message;
    } catch (_) {}
    throw new Error(errMsg);
  }

  const data = await res.json();
  const content = data?.choices?.[0]?.message?.content;
  if (!content || !content.trim()) throw new Error('Empty response from API');
  return content.trim();
}

async function sendUserMessage() {
  const text = chatInput.value.trim();
  if (!text || chatBusy) return;

  chatInput.value = '';
  chatSend.disabled = true;
  addChatMsg('user', text);

  chatHistory.push({ role: 'user', content: text });
  await generateResponse();
}

async function generateResponse() {
  chatBusy = true;
  chatSend.disabled = true;
  showTyping();
  chatStatus.textContent = '// ANALYZING...';

  try {
    const ctx = getWeatherContext();
    const systemMsg = ctx
      ? { role: 'system', content: buildSystemPrompt(ctx) }
      : { role: 'system', content: 'You are a friendly outfit advisor. Give general clothing advice. Be concise.' };

    const messages = [systemMsg, ...chatHistory];
    const reply = await callLLM(messages);

    removeTyping();
    addChatMsg('bot', reply);
    chatHistory.push({ role: 'assistant', content: reply });
    chatStatus.textContent = '// AI-POWERED STYLE INTEL';
  } catch (err) {
    removeTyping();
    addChatMsg('bot', 'Connection error. Make sure the proxy server is running (node proxy.js).');
    chatStatus.textContent = '// CONNECTION ERROR';
    setTimeout(() => { chatStatus.textContent = '// AI-POWERED STYLE INTEL'; }, 3000);
  }

  chatBusy = false;
  chatSend.disabled = !chatInput.value.trim();
}

async function triggerAutoAdvice() {
  if (autoAdviceShown) return;
  autoAdviceShown = true;

  const ctx = getWeatherContext();
  if (!ctx) return;

  chatHistory = [
    { role: 'user', content: `What should I wear today in ${ctx.city}, ${ctx.countryName}? The weather is ${ctx.temp}°C, ${ctx.condition}, humidity ${ctx.humidity}%, wind ${ctx.wind} km/h.` }
  ];

  // Show badge notification
  chatBadge.style.display = 'block';

  // If panel is open, generate and show directly
  if (chatPanel.classList.contains('open')) {
    await generateResponse();
  } else {
    // Pre-generate in background
    try {
      const systemMsg = { role: 'system', content: buildSystemPrompt(ctx) };
      const reply = await callLLM([systemMsg, ...chatHistory]);
      chatHistory.push({ role: 'assistant', content: reply });
      chatPreloaded = true;
    } catch (err) {
      console.warn('[AutoAdvice] Failed:', err.message);
      chatBadge.style.display = 'none';
      autoAdviceShown = false;
    }
  }
}

// Hook into renderAll to auto-trigger advice after weather loads
const _originalRenderAll = renderAll;
renderAll = function() {
  _originalRenderAll();
  if (CITIES.length > 0 && cityResults.size > 0 && !autoAdviceShown) {
    setTimeout(triggerAutoAdvice, 1500);
  }
};

init();
</script>
